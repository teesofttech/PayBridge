name: Secret Scanning

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - 'feature/**'
      - 'fix/**'
      - 'security/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Scan working tree for committed secrets
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.27.2
        with:
          args: dir /github/workspace --redact --no-banner
