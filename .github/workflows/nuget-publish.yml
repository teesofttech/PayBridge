name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.1.0, v1.2.0, etc.

jobs:
  publish:
    name: Build & Publish NuGet Package
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write   # Required for OIDC Trusted Publishing — no API key stored

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore PayBridge.SDK/PayBridge.SDK.csproj

      - name: Build (Release)
        run: dotnet build PayBridge.SDK/PayBridge.SDK.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack NuGet package
        run: dotnet pack PayBridge.SDK/PayBridge.SDK.csproj --configuration Release --no-build --output ./nupkg -p:Version=${{ steps.version.outputs.version }}

      - name: Get OIDC token for NuGet.org
        id: oidc
        run: |
          TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" | jq -r '.value')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet.org (Trusted Publisher)
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.oidc.outputs.token }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

