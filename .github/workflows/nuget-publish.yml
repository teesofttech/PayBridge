name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.1.0, v1.2.0, etc.

jobs:
  publish:
    name: Build & Publish NuGet Package
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: write   # Required to create/publish GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore PayBridge.SDK/PayBridge.SDK.csproj

      - name: Build (Release)
        run: dotnet build PayBridge.SDK/PayBridge.SDK.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack NuGet package
        run: dotnet pack PayBridge.SDK/PayBridge.SDK.csproj --configuration Release --no-build --output ./nupkg -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create & publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          files: ./nupkg/*.nupkg


