version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    target-branch: master
    open-pull-requests-limit: 5
    groups:
      microsoft-dotnet:
        patterns:
          - "Microsoft.*"
          - "System.*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/London
    target-branch: master
    open-pull-requests-limit: 5
